# Deploy to GitHub Pages
name: Deploy to GitHub Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  # ── Change this if the repo name changes ──
  BASE_PATH: /ZombsBuildingSandbox/

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build with GitHub Pages base path
        run: pnpm exec webpack --config webpack.ghpages.js
        env:
          BASE_PATH: ${{ env.BASE_PATH }}

      # Rewrite all hardcoded absolute "/asset/" references in the built
      # HTML, CSS and JS files so they resolve under the subpath.
      # This covers:
      #   - inline <script> asset paths  (e.g. "/asset/image/...")
      #   - CSS url('/asset/...')         references
      #   - <link href="/asset/app.css">  and <script src="/asset/app.js">
      - name: Rewrite absolute asset paths for subpath deployment
        run: |
          echo "Rewriting /asset/ → ${BASE_PATH}asset/ in release/"
          find release -type f \( -name '*.html' -o -name '*.css' -o -name '*.js' \) \
            -exec sed -i "s|/asset/|${BASE_PATH}asset/|g" {} +

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./release

  deploy:
    environment:
      name: github-pages
      url: ${{ github.event.deployment.payload.web_url || steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
